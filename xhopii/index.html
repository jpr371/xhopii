<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xhopii - Ver Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <section class="header-top">
            <section class="logo-area">
                <img src="img/logo.png" alt="Xhopii Logo">
                <span class="logo-text">Xhopii</span>
            </section>
            <a href="login.html" class="exit-link">Sair</a>
        </section>
        <nav class="nav-bar">
            <a href="home.html">Home</a>
            <a href="cad_cliente.html">Cadastro Cliente</a>
            <a href="cad_funcionario.html">Cadastro Funcionário</a>
            <a href="cad_produto.html">Cadastro Produto</a>
            <a href="cad_loja.html">Cadastro Loja</a>
            <a href="cad_cupons.html">Cadastro Cupom</a>
            <a href="ver_clientes.html">Ver Clientes</a>
            <a href="ver_funcionarios.html">Ver Funcionários</a>
            <a href="ver_produtos.html">Ver Produtos</a>
            <a href="ver_lojas.html">Ver Lojas</a>
            <a href="ver_cupons.html">Ver Cupons</a>
        </nav>
    </header>

    <main class="product-view">

        <aside class="thumbnails">
            <img src="img/produto1.png" alt="Miniatura Cinza">
            <img src="img/produto2.png" alt="Miniatura Azul">
            <img src="img/produto3.png" alt="Miniatura Verde">
            <img src="img/produto4.png" alt="Miniatura Cinza Claro">
            <img src="img/produto5.png" alt="Miniatura Rosa">
        </aside>

        <section class="main-image">
            <img src="img/produto1.png" alt="Camisa Desenvolvedor Front-End CSS">
        </section>

        <section class="details">
            <h1>Camisa Desenvolvedor Front-End CSS</h1>

            <p class="price"><b>R$56,90</b></p>

            <p class="stock"><small>171 peças disponíveis</small></p>

            <section class="option-group">
                <p><u>Modelos:</u></p>
                <section class="buttons">
                    <button type="button">Preto</button>
                    <button type="button">Azul</button>
                    <button type="button">Verde</button>
                    <button type="button">Cinza</button>
                    <button type="button">Rosa</button>
                </section>
            </section>

            <section class="option-group">
                <p><u>Tamanhos:</u></p>
                <section class="buttons">
                    <button type="button">P</button>
                    <button type="button">M</button>
                    <button type="button">G</button>
                    <button type="button">GG</button>
                </section>
            </section>

            <p class="selection-info">Tamanho Selecionado: <strong>P</strong></p>

            <button type="submit" class="buy-button">Comprar Agora</button>
        </section>

    </main>

</body>
</html>
